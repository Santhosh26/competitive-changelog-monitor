<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competitive Changelog Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Scanline overlay for command-center atmosphere -->
  <div class="scanlines" aria-hidden="true"></div>

  <div class="app">
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">
          <span class="brand-glyph">C</span>
          <div class="brand-pulse"></div>
        </div>
        <div class="brand-text-group">
          <span class="brand-text">INTEL HQ</span>
          <span class="brand-sub">Changelog Monitor</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="feed">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="14" height="3" rx="1"/>
            <rect x="3" y="8.5" width="14" height="3" rx="1"/>
            <rect x="3" y="14" width="14" height="3" rx="1"/>
          </svg>
          <span class="nav-label">Feed</span>
        </a>
        <a href="#" class="nav-item" data-view="digests">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="2" width="14" height="16" rx="2"/>
            <line x1="6" y1="6" x2="14" y2="6"/>
            <line x1="6" y1="9" x2="14" y2="9"/>
            <line x1="6" y1="12" x2="10" y2="12"/>
          </svg>
          <span class="nav-label">Digests</span>
        </a>
        <a href="#" class="nav-item" data-view="health">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,10 5,10 7,4 10,16 13,8 15,10 18,10"/>
          </svg>
          <span class="nav-label">Health</span>
        </a>
        <a href="#" class="nav-item" data-view="sources">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="10" cy="5" rx="7" ry="3"/>
            <path d="M3 5v4c0 1.66 3.13 3 7 3s7-1.34 7-3V5"/>
            <path d="M3 9v4c0 1.66 3.13 3 7 3s7-1.34 7-3V9"/>
          </svg>
          <span class="nav-label">Sources</span>
        </a>
        <a href="#" class="nav-item" data-view="search">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8.5" cy="8.5" r="5.5"/>
            <line x1="13" y1="13" x2="17" y2="17"/>
          </svg>
          <span class="nav-label">Search</span>
        </a>
        <a href="#" class="nav-item" data-view="trends">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3,15 7,9 11,12 17,4"/>
            <polyline points="13,4 17,4 17,8"/>
          </svg>
          <span class="nav-label">Trends</span>
        </a>
        <a href="#" class="nav-item" data-view="settings">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="3"/>
            <path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M3.4 3.4l1.4 1.4M15.2 15.2l1.4 1.4M3.4 16.6l1.4-1.4M15.2 4.8l1.4-1.4"/>
          </svg>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse sidebar">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="12,4 6,10 12,16"/>
        </svg>
      </button>
    </aside>

    <!-- Main Area -->
    <div class="main-area">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <h2 id="topbar-title">Recent Updates</h2>
          <div class="live-badge"><span class="live-dot"></span>LIVE</div>
        </div>
        <div class="topbar-right">
          <span id="user-email" class="user-email"></span>
          <button id="logout-btn" class="btn-ghost">Logout</button>
        </div>
      </header>

      <!-- Main content -->
      <main class="container">
        <!-- Feed View (default) -->
        <div id="view-feed" class="view active">
          <div class="feed-header">
            <div class="filters">
              <select id="filter-competitor" class="filter-select">
                <option value="">All Competitors</option>
              </select>
              <select id="filter-tag" class="filter-select">
                <option value="">All Tags</option>
              </select>
              <select id="filter-relevance" class="filter-select">
                <option value="">All Relevance</option>
                <option value="80">Critical (80+)</option>
                <option value="50">Notable (50-79)</option>
                <option value="0">Other (&lt;50)</option>
              </select>
              <label class="checkbox-label">
                <input type="checkbox" id="filter-reviewed">
                Unreviewed only
              </label>
            </div>
          </div>
          <div id="feed-entries" class="entries-list">
            <!-- Entries loaded dynamically -->
          </div>
        </div>

        <!-- Digests View -->
        <div id="view-digests" class="view">
          <div class="digests-header">
            <button id="btn-generate-digest" class="btn-primary">Generate Digest Now</button>
          </div>
          <div id="digests-list" class="digests-list">
            <!-- Digests loaded dynamically -->
          </div>
        </div>

        <!-- Health View -->
        <div id="view-health" class="view">
          <div class="health-header">
            <button id="btn-refresh-health" class="btn-secondary">Refresh</button>
          </div>
          <div id="health-sources" class="health-grid">
            <!-- Source health loaded dynamically -->
          </div>
        </div>

        <!-- Sources View -->
        <div id="view-sources" class="view">
          <div class="sources-header">
            <button id="btn-add-competitor" class="btn-primary">+ Add Competitor</button>
          </div>
          <div id="sources-list" class="sources-grid"></div>
        </div>

        <!-- Search View -->
        <div id="view-search" class="view">
          <div class="search-header">
            <div class="search-box">
              <input type="text" id="search-input" placeholder="Search entries..." class="search-input">
              <button id="btn-search" class="btn-primary">Search</button>
            </div>
          </div>
          <div id="search-results" class="entries-list">
            <!-- Search results loaded dynamically -->
          </div>
        </div>

        <!-- Trends View -->
        <div id="view-trends" class="view">
          <div class="trends-grid">
            <div class="trend-chart">
              <h3>Entries by Competitor (Last 30 Days)</h3>
              <canvas id="chart-competitor"></canvas>
            </div>
            <div class="trend-chart">
              <h3>Tags Distribution</h3>
              <canvas id="chart-tags"></canvas>
            </div>
          </div>
        </div>

        <!-- Settings View -->
        <div id="view-settings" class="view">
          <div class="settings-header">
            <button id="btn-save-settings" class="btn-primary">Save All</button>
            <button id="btn-reset-settings" class="btn-secondary">Reset to Defaults</button>
          </div>
          <div id="settings-form" class="settings-form">
            <!-- Settings sections loaded dynamically -->
          </div>
        </div>
      </main>
    </div>

    <!-- Source Wizard Modal -->
    <div id="source-wizard-modal" class="modal" style="display: none;">
      <div class="modal-overlay"></div>
      <div class="modal-content modal-wide">
        <span class="close" id="wizard-close">&times;</span>
        <h3 id="wizard-title">Add Competitor</h3>
        <div id="wizard-body"></div>
      </div>
    </div>

    <!-- Action Modal -->
    <div id="action-modal" class="modal" style="display: none;">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <span class="close">&times;</span>
        <h3 id="action-modal-title">Action</h3>
        <div id="action-modal-body">
          <!-- Action form loaded dynamically -->
        </div>
      </div>
    </div>
  </div>

  <!-- Chart.js for trend visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <!-- DOMPurify for XSS protection -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <!-- App scripts -->
  <script src="app.js"></script>
</body>
</html>
